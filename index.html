<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Science Academic Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background-color: #f8fafc;
      overflow-x: hidden;
    }
    /* Science Visualization Background */
    .bg-particles {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: -1;
      background: radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.05), transparent 25%),
                  radial-gradient(circle at 85% 30%, rgba(99, 102, 241, 0.05), transparent 25%);
    }
    .molecule {
      position: absolute;
      background: rgba(148, 163, 184, 0.1);
      border-radius: 50%;
      animation: float 20s infinite ease-in-out;
    }
    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(180deg); }
      100% { transform: translateY(0px) rotate(360deg); }
    }
    .folder-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .folder-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body class="text-slate-800">

  <div class="bg-particles">
    <div class="molecule" style="width: 100px; height: 100px; top: 10%; left: 10%; animation-delay: 0s;"></div>
    <div class="molecule" style="width: 150px; height: 150px; top: 60%; right: 15%; animation-delay: -5s;"></div>
    <div class="molecule" style="width: 80px; height: 80px; bottom: 20%; left: 20%; animation-delay: -10s;"></div>
  </div>

  <div class="max-w-6xl mx-auto px-4 py-12">
    <header class="mb-12 text-center relative z-10">
      <div class="inline-flex items-center justify-center p-3 bg-emerald-100 text-emerald-600 rounded-2xl mb-4 shadow-sm">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
      </div>
      <h1 class="text-4xl font-bold tracking-tight text-slate-900 mb-2">Science Study Portal</h1>
      <p class="text-slate-500 max-w-2xl mx-auto">Access your WBBSE curriculum notes, exam questions, and answer keys for Life Science and Physical Science.</p>
    </header>

    <div class="bg-white/80 backdrop-blur-xl rounded-3xl p-6 md:p-10 shadow-xl border border-slate-100 min-h-[500px]">
      
      <nav class="flex items-center space-x-2 text-sm font-medium text-slate-500 mb-8 pb-4 border-b border-slate-200 overflow-x-auto" id="breadcrumbs">
        </nav>

      <div id="content-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        </div>

    </div>
  </div>

  <script>
    // --- DATABASE STRUCTURE ---
    // You can easily add new PDFs or classes by editing this JSON object.
    // --- DYNAMIC DATABASE FROM GOOGLE SHEETS ---
    // PASTE YOUR PUBLISHED CSV LINK BELOW:
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT7u9zuHi8Z_O6SNLuS8FmPMdj4FnDIkTahTR72GbIIMWLkjFk6uh1b42u04vTe_GBid1Rp2yoQwcXS/pub?output=csv";

    let database = {
      "Class 7": { "Life Science": { "Notes": [], "Exam Ques": [], "Answer Key": [] }, "Physical Science": { "Notes": [], "Exam Ques": [], "Answer Key": [] } },
      "Class 8": { "Life Science": { "Notes": [], "Exam Ques": [], "Answer Key": [] }, "Physical Science": { "Notes": [], "Exam Ques": [], "Answer Key": [] } },
      "Class 9": { "Life Science": { "Notes": [], "Exam Ques": [], "Answer Key": [] }, "Physical Science": { "Notes": [], "Exam Ques": [], "Answer Key": [] } },
      "Class 10": { "Life Science": { "Notes": [], "Exam Ques": [], "Answer Key": [] }, "Physical Science": { "Notes": [], "Exam Ques": [], "Answer Key": [] } }
    };

    let currentPath = [];

    const breadcrumbsContainer = document.getElementById('breadcrumbs');
    const contentGrid = document.getElementById('content-grid');

    function renderApp() {
      renderBreadcrumbs();
      renderGrid();
    }

    function renderBreadcrumbs() {
      breadcrumbsContainer.innerHTML = '';
      
      // Home button
      const homeBtn = document.createElement('button');
      homeBtn.className = 'hover:text-emerald-600 transition flex items-center whitespace-nowrap';
      homeBtn.innerHTML = '<svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg> Home';
      homeBtn.onclick = () => { currentPath = []; renderApp(); };
      breadcrumbsContainer.appendChild(homeBtn);

      // Path segments
      currentPath.forEach((segment, index) => {
        const separator = document.createElement('span');
        separator.className = 'mx-2 text-slate-300';
        separator.innerText = '/';
        breadcrumbsContainer.appendChild(separator);

        const pathBtn = document.createElement('button');
        pathBtn.className = index === currentPath.length - 1 ? 'text-slate-800 font-semibold whitespace-nowrap' : 'hover:text-emerald-600 transition whitespace-nowrap';
        pathBtn.innerText = segment;
        pathBtn.onclick = () => { currentPath = currentPath.slice(0, index + 1); renderApp(); };
        breadcrumbsContainer.appendChild(pathBtn);
      });
    }

    function renderGrid() {
      contentGrid.innerHTML = '';
      
      let currentData = database;
      for (const segment of currentPath) {
        currentData = currentData[segment];
      }

      // If currentData is an Array, we are at the PDF level
      if (Array.isArray(currentData)) {
        if (currentData.length === 0) {
          contentGrid.innerHTML = '<div class="col-span-full py-12 text-center text-slate-400">No documents uploaded here yet.</div>';
          return;
        }

        currentData.forEach(pdf => {
          // Google Drive link constructors
          const viewLink = `https://drive.google.com/file/d/${pdf.fileId}/view`;
          const downloadLink = `https://drive.google.com/uc?export=download&id=${pdf.fileId}`;

          const pdfCard = document.createElement('div');
          pdfCard.className = 'folder-card bg-white border border-slate-200 p-5 rounded-2xl flex flex-col h-full';
          pdfCard.innerHTML = `
            <div class="w-10 h-10 bg-rose-50 text-rose-500 rounded-xl flex items-center justify-center mb-4">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
            </div>
            <h3 class="font-semibold text-slate-800 mb-4 flex-grow">${pdf.title}</h3>
            <div class="flex gap-2 mt-auto">
              <a href="${viewLink}" target="_blank" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium py-2 rounded-lg text-center transition">View</a>
              <a href="${downloadLink}" target="_blank" class="flex-1 bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-medium py-2 rounded-lg text-center transition shadow-sm">Download</a>
            </div>
          `;
          contentGrid.appendChild(pdfCard);
        });
      } 
      // Otherwise, we are looking at Folders
      else {
        for (const key in currentData) {
          const folderCard = document.createElement('button');
          
          // Color logic based on subject/folder type
          let iconColor = 'text-blue-500 bg-blue-50';
          if (key === 'Life Science' || key === 'Zoology' || key === 'Botany') iconColor = 'text-emerald-500 bg-emerald-50';
          if (key === 'Physical Science') iconColor = 'text-indigo-500 bg-indigo-50';
          if (key === 'Exam Ques') iconColor = 'text-amber-500 bg-amber-50';
          if (key === 'Answer Key') iconColor = 'text-purple-500 bg-purple-50';

          folderCard.className = 'folder-card bg-white border border-slate-200 p-6 rounded-2xl text-left flex flex-col items-start focus:outline-none focus:ring-2 focus:ring-emerald-500';
          folderCard.innerHTML = `
            <div class="w-12 h-12 ${iconColor} rounded-xl flex items-center justify-center mb-4">
              <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
            </div>
            <h3 class="font-semibold text-lg text-slate-800">${key}</h3>
            <p class="text-xs text-slate-400 mt-1">Open Folder →</p>
          `;
          folderCard.onclick = () => {
            currentPath.push(key);
            renderApp();
          };
          contentGrid.appendChild(folderCard);
        }
      }
    }

    // Initialize
    // --- FETCH DATA AND INITIALIZE ---
    Papa.parse(sheetUrl, {
      download: true,
      header: true,
      complete: function(results) {
        const rows = results.data;
        rows.forEach(row => {
          if(row.Class && row.Subject && row.Folder && row.Title && row.FileID) {
            // Ensure the folder path exists in our template before pushing
            if(database[row.Class] && database[row.Class][row.Subject] && database[row.Class][row.Subject][row.Folder]) {
               database[row.Class][row.Subject][row.Folder].push({
                 title: row.Title,
                 fileId: row.FileID
               });
            }
          }
        });
        // Render the app ONLY AFTER data is loaded
        renderApp();
      }
    });
  </script>
</body>
</html>
