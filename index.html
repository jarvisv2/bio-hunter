<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Science Academic Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      /* Vibrant, Animated Gradient Background */
      background: linear-gradient(-45deg, #3b82f6, #06b6d4, #10b981, #6366f1);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      color: #1e293b;
      overflow-x: hidden;
      min-height: 100vh;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* --- Floating Science Elements --- */
    .bg-science-elements {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .float-icon {
      position: absolute;
      color: rgba(255, 255, 255, 0.15); /* Much more visible now! */
      animation: float-random 20s infinite linear;
    }

    .icon-1 { top: 15%; left: 8%; width: 140px; height: 140px; animation-duration: 25s; animation-direction: alternate; }
    .icon-2 { top: 65%; left: 82%; width: 160px; height: 160px; animation-duration: 30s; animation-delay: -5s; }
    .icon-3 { top: 75%; left: 12%; width: 120px; height: 120px; animation-duration: 22s; animation-direction: alternate-reverse; }
    .icon-4 { top: 15%; left: 75%; width: 110px; height: 110px; animation-duration: 28s; animation-delay: -10s; }
    
    .equation { font-size: 4.5rem; font-weight: 800; font-family: serif; letter-spacing: 2px;}

    @keyframes float-random {
      0% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(40px, -50px) rotate(15deg); }
      66% { transform: translate(-30px, 30px) rotate(-10deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    /* --- Premium Glassmorphism UI --- */
    .glass-container {
      background: rgba(255, 255, 255, 0.85); /* Solid enough to read text easily */
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255,255,255,0.4) inset;
      position: relative;
      z-index: 10;
    }

    /* 3D Folder Cards */
    .folder-card {
      background: white;
      border: 1px solid #e2e8f0;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
      border-radius: 1.5rem;
    }

    .folder-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px -10px rgba(16, 185, 129, 0.15), 0 10px 20px -5px rgba(59, 130, 246, 0.1);
      border-color: #cbd5e1;
    }

    .folder-icon-container {
      transition: transform 0.3s ease, background 0.3s ease;
    }
    
    .folder-card:hover .folder-icon-container {
      transform: scale(1.1) rotate(5deg);
    }

    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>

  <div class="bg-science-elements">
    <svg class="float-icon icon-1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2 15c6.667-6 13.333 0 20-6M9 22c1.798-1.998 2.518-3.995 2.807-5.993M15 2c-1.798 1.998-2.518 3.995-2.807 5.993M17 10l-4-4M10.5 16.5l-4-4"/></svg>
    <div class="float-icon icon-2 equation text-center pt-8">E=mc²</div>
    <svg class="float-icon icon-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18h8M3 22h18M14 22a7 7 0 1 0 0-14h-1M9 14h2M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2ZM12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3"/></svg>
    <svg class="float-icon icon-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="2"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 2v20M2 12h20 M5 5l14 14 M5 19L19 5"/></svg>
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 md:py-16 relative z-10">
    
    <header class="mb-12 text-center text-white">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-white/20 backdrop-blur-md text-white rounded-3xl mb-6 shadow-lg border border-white/30">
        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
      </div>
      <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-4 drop-shadow-md">Science Portal</h1>
      <p class="text-lg md:text-xl text-white/90 max-w-2xl mx-auto font-medium drop-shadow">WBBSE curriculum notes, exam questions, and answer keys.</p>
    </header>

    <div class="glass-container rounded-[2.5rem] p-6 md:p-10 min-h-[500px]">
      
      <nav class="flex items-center space-x-2 text-sm font-medium text-slate-500 mb-8 pb-4 border-b border-slate-200 overflow-x-auto scrollbar-hide" id="breadcrumbs">
      </nav>

      <div id="content-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8">
      </div>

    </div>
  </div>

  <script>
    // --- DYNAMIC DATABASE FROM GOOGLE SHEETS ---
    // PASTE YOUR PUBLISHED CSV LINK BELOW:
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT7u9zuHi8Z_O6SNLuS8FmPMdj4FnDIkTahTR72GbIIMWLkjFk6uh1b42u04vTe_GBid1Rp2yoQwcXS/pub?output=csv"; 

    let database = {
      "Class 7": { "Life Science": { "Notes": [], "Exam Ques": [], "Answer Key": [] }, "Physical Science": { "Notes": [], "Exam Ques": [], "Answer Key": [] } },
      "Class 8": { "Life Science": { "Notes": [], "Exam Ques": [], "Answer Key": [] }, "Physical Science": { "Notes": [], "Exam Ques": [], "Answer Key": [] } },
      "Class 9": { "Life Science": { "Notes": [], "Exam Ques": [], "Answer Key": [] }, "Physical Science": { "Notes": [], "Exam Ques": [], "Answer Key": [] } },
      "Class 10": { "Life Science": { "Notes": [], "Exam Ques": [], "Answer Key": [] }, "Physical Science": { "Notes": [], "Exam Ques": [], "Answer Key": [] } }
    };

    let currentPath = [];
    const breadcrumbsContainer = document.getElementById('breadcrumbs');
    const contentGrid = document.getElementById('content-grid');

    function renderApp() {
      renderBreadcrumbs();
      renderGrid();
    }

    function renderBreadcrumbs() {
      breadcrumbsContainer.innerHTML = '';
      
      const homeBtn = document.createElement('button');
      homeBtn.className = 'hover:text-blue-600 transition flex items-center whitespace-nowrap py-1.5 px-4 bg-slate-100 hover:bg-blue-50 rounded-xl text-slate-600 font-semibold';
      homeBtn.innerHTML = '<svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg> Home';
      homeBtn.onclick = () => { currentPath = []; renderApp(); };
      breadcrumbsContainer.appendChild(homeBtn);

      currentPath.forEach((segment, index) => {
        const separator = document.createElement('span');
        separator.className = 'mx-2 text-slate-300';
        separator.innerText = '›';
        breadcrumbsContainer.appendChild(separator);

        const pathBtn = document.createElement('button');
        pathBtn.className = index === currentPath.length - 1 
            ? 'text-white bg-slate-800 font-bold whitespace-nowrap py-1.5 px-4 rounded-xl shadow-md' 
            : 'text-slate-600 hover:text-blue-600 font-semibold transition whitespace-nowrap py-1.5 px-2';
        pathBtn.innerText = segment;
        pathBtn.onclick = () => { currentPath = currentPath.slice(0, index + 1); renderApp(); };
        breadcrumbsContainer.appendChild(pathBtn);
      });
    }

    function renderGrid() {
      contentGrid.innerHTML = '';
      
      let currentData = database;
      for (const segment of currentPath) {
        currentData = currentData[segment];
      }

      if (Array.isArray(currentData)) {
        if (currentData.length === 0) {
          contentGrid.innerHTML = `
            <div class="col-span-full py-20 text-center flex flex-col items-center justify-center text-slate-400">
                <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mb-4">
                  <svg class="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <p class="font-medium text-lg">No documents uploaded here yet.</p>
            </div>`;
          return;
        }

        currentData.forEach(pdf => {
          const viewLink = `https://drive.google.com/file/d/${pdf.fileId}/view`;
          const downloadLink = `https://drive.google.com/uc?export=download&id=${pdf.fileId}`;

          const pdfCard = document.createElement('div');
          pdfCard.className = 'folder-card p-6 flex flex-col h-full';
          pdfCard.innerHTML = `
            <div class="folder-icon-container w-14 h-14 bg-gradient-to-br from-rose-100 to-rose-200 text-rose-600 rounded-2xl flex items-center justify-center mb-5 shadow-sm">
              <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
            </div>
            <h3 class="font-bold text-slate-800 text-lg mb-6 flex-grow leading-tight">${pdf.title}</h3>
            <div class="flex gap-3 mt-auto">
              <a href="${viewLink}" target="_blank" class="flex-1 bg-white hover:bg-slate-50 border-2 border-slate-200 text-slate-700 text-sm font-bold py-3 rounded-xl text-center transition">View</a>
              <a href="${downloadLink}" target="_blank" class="flex-1 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white text-sm font-bold py-3 rounded-xl text-center transition shadow-md">Download</a>
            </div>
          `;
          contentGrid.appendChild(pdfCard);
        });
      } 
      else {
        for (const key in currentData) {
          const folderCard = document.createElement('button');
          
          let iconBg = 'bg-gradient-to-br from-blue-400 to-blue-600 text-white';
          if (key === 'Life Science') iconBg = 'bg-gradient-to-br from-emerald-400 to-emerald-600 text-white';
          if (key === 'Physical Science') iconBg = 'bg-gradient-to-br from-indigo-400 to-indigo-600 text-white';
          if (key === 'Exam Ques') iconBg = 'bg-gradient-to-br from-amber-400 to-orange-500 text-white';
          if (key === 'Answer Key') iconBg = 'bg-gradient-to-br from-purple-400 to-purple-600 text-white';

          folderCard.className = 'folder-card p-6 md:p-8 text-left flex flex-col items-start focus:outline-none focus:ring-4 focus:ring-blue-100';
          folderCard.innerHTML = `
            <div class="folder-icon-container w-16 h-16 ${iconBg} rounded-2xl flex items-center justify-center mb-6 shadow-md border border-white/20">
              <svg class="w-8 h-8 drop-shadow-sm" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>
            </div>
            <h3 class="font-extrabold text-2xl text-slate-800 tracking-tight">${key}</h3>
            <p class="text-sm text-slate-500 mt-2 font-bold flex items-center group-hover:text-blue-600 transition-colors">Open Folder <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg></p>
          `;
          folderCard.onclick = () => {
            currentPath.push(key);
            renderApp();
          };
          contentGrid.appendChild(folderCard);
        }
      }
    }

    // --- INITIALIZE ---
    Papa.parse(sheetUrl, {
      download: true,
      header: true,
      complete: function(results) {
        const rows = results.data;
        rows.forEach(row => {
          if(row.Class && row.Subject && row.Folder && row.Title && row.FileID) {
            if(database[row.Class] && database[row.Class][row.Subject] && database[row.Class][row.Subject][row.Folder]) {
               database[row.Class][row.Subject][row.Folder].push({
                 title: row.Title,
                 fileId: row.FileID
               });
            }
          }
        });
        renderApp();
      }
    });
  </script>
</body>
</html>
